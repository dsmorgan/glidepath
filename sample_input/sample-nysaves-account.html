<!--
  SANITIZED sample of a NYSaves (Ascensus "Unite") account summary page.
  Real account numbers, owner/beneficiary names, units and balances have been
  replaced with fake values. The STRUCTURE mirrors the live page so it can drive
  the holdings-extraction bookmarklet/parser:
    - account number:  span.unite-header-account-number  (e.g. "12345678-02")
    - account switcher: select#jumpAcct  (one <option> per beneficiary; selected = shown)
    - holdings:         the Knockout "ko component" UniteAccordion JSON comment
  Portfolio names are the real public NYSaves portfolio names (they match seeded VirtualFunds).
-->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>NYSaves 529 - Account Summary (sanitized sample)</title></head>
<body>
  <form id="acctForm">
    <label for="jumpAcct" class="unite-select-label unite-accessible">Acct</label>
    <select name="cse" id="jumpAcct" class="unite-select-basic" data-width="140px">
      <option value="01">01 - Sam Q Sample</option>
      <option value="02" selected="selected">02 - Alex R Sample</option>
    </select>

    <p class="unite-header-account">
      <span class="unite-header-account-number">12345678-02</span>
      <span class="unite-header-account-type">Individual</span>
    </p>
  </form>

  <div id="caoBalDiv" style="margin-bottom:20px;">&nbsp;</div>

</html>
